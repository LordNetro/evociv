schema: spec-driven

context: |
  Tech stack: Python/FastAPI backend (async, SQLAlchemy + aiosqlite, LiteLLM, WebSocket) + SvelteKit frontend (Svelte 5 runes, TypeScript 6, Vite 8, PixiJS v8 2D canvas, Chart.js)
  Architecture: Monorepo (npm workspaces) with two-service architecture — FastAPI backend (app/) with simulation engine + AI orchestration, SvelteKit frontend (frontend/) with reactive stores + PixiJS v8 2D rendering
  Communication: WebSocket (delta snapshots in real time)
  Persistence: SQLite (events/metrics) + JSON configs (world/agents/rules) + ChromaDB (agent memory via LiteLLM)
  Testing: pytest + pytest-asyncio + httpx ASGITransport (backend, 114 tests), svelte-check (frontend type check). NO frontend test framework.
  Style: ruff (Python linting + formatting), ESLint + Prettier (JS/TS/Svelte)

strict_tdd: true

testing:
  runner:
    command: python -m pytest tests/ -v
    framework: pytest (v8+)
  layers:
    unit:
      available: true
      tool: pytest + pytest-asyncio
    integration:
      available: true
      tool: httpx (ASGITransport)
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  frontend_test_framework: NOT INSTALLED
  quality:
    linter:
      available: true
      command: ruff check . (backend) / prettier --check . && eslint . (frontend)
    type_checker:
      available: true
      command: svelte-check (frontend) / N/A (backend)
    formatter:
      available: true
      command: ruff format (backend) / prettier --write . (frontend)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
