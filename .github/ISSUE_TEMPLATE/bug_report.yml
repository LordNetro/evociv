name: 🐞 Bug Report
description: Report a bug to help us improve Evociv
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: When I click on an agent, the side panel doesn't open...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Start a simulation with '...'
        2. Click on agent '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or logs to help explain the problem.
      render: shell
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you running Evociv?
      options:
        - Local (Ollama)
        - Cloud
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Evociv are you running? (commit hash or tag)
      placeholder: e.g., v0.1.0 or abc1234
